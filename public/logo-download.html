<!DOCTYPE html>
<html>
<head><title>Sasanova Logo</title>
<style>
body { background: #0c0c0f; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; gap: 40px; }
.logo-box { background: #0c0c0f; padding: 40px; border-radius: 16px; text-align: center; }
.label { color: #71717a; font-family: system-ui; font-size: 14px; margin-top: 12px; }
</style>
</head>
<body>
<div class="logo-box">
<svg width="400" height="400" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" rx="8" fill="url(#sn-grad)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <ellipse cx="16" cy="16" rx="10" ry="10" stroke="white" stroke-opacity="0.25" stroke-width="1" fill="none"/>
  <ellipse cx="16" cy="16" rx="10" ry="5" stroke="white" stroke-opacity="0.5" stroke-width="1.2" fill="none" transform="rotate(-25 16 16)"/>
  <circle cx="16" cy="16" r="3" fill="white" fill-opacity="0.95"/>
  <circle cx="16" cy="16" r="1.5" fill="url(#sn-grad)"/>
  <circle cx="16" cy="6" r="1.5" fill="white" fill-opacity="0.8"/>
  <circle cx="23.5" cy="13" r="1" fill="#a5b4fc" fill-opacity="0.7"/>
  <defs>
    <linearGradient id="sn-grad" x1="0" y1="0" x2="32" y2="32">
      <stop stop-color="#818cf8"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
</svg>
<div class="label">Right-click the logo above → Save Image As</div>
</div>
<div class="logo-box">
<svg width="200" height="200" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="32" height="32" rx="8" fill="url(#sn-grad2)" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <ellipse cx="16" cy="16" rx="10" ry="10" stroke="white" stroke-opacity="0.25" stroke-width="1" fill="none"/>
  <ellipse cx="16" cy="16" rx="10" ry="5" stroke="white" stroke-opacity="0.5" stroke-width="1.2" fill="none" transform="rotate(-25 16 16)"/>
  <circle cx="16" cy="16" r="3" fill="white" fill-opacity="0.95"/>
  <circle cx="16" cy="16" r="1.5" fill="url(#sn-grad2)"/>
  <circle cx="16" cy="6" r="1.5" fill="white" fill-opacity="0.8"/>
  <circle cx="23.5" cy="13" r="1" fill="#a5b4fc" fill-opacity="0.7"/>
  <defs>
    <linearGradient id="sn-grad2" x1="0" y1="0" x2="32" y2="32">
      <stop stop-color="#818cf8"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
</svg>
<div class="label">Small version (200x200)</div>
</div>
</body>
</html>
